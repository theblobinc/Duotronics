[pytest]
minversion = 7.0
testpaths = conformance
addopts = -ra
markers =
    normative: tests required for the merge gate
    research: informational research-profile tests
    fuzz: hypothesis-based negative/fuzz tests
    golden: end-to-end golden trace replay tests
    migration: migration plan and replay-version tests
    replay: replay-identity tests
    policy: policy-shield decision-matrix tests
    meta_runtime: standalone meta-runtime conformance slice
    slow: long-running tests (excluded from default run)
filterwarnings =
    ignore::DeprecationWarning
