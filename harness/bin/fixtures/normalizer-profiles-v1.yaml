pack_id: normalizer-profiles-v1
schema_version: v1.2
target_schema_version: v1.2
description: |
  Normalizer Profiles v1 (Witness Contract Normalizer §7-§8). Each profile
  is deterministic and version-pinned; failures surface explicit failure
  codes and a policy_action mapping into the policy shield.

cases:
  - case_id: simple.hex6.h1h4
    op: normalize_family_word
    given: { family_id: hex6, word: [h1, h4] }
    expect:
      equals:
        failure_code: null
        policy_action: normal
        canonical_storage: "family:hex6 schema_version:dpfc-family@v5.8 digits:1 4"
        core_magnitude: mu_10
        lookup_allowed: true
        normalizer_version: simple-bijective-word-normalizer@v1

  - case_id: simple.unknown_family
    op: normalize_family_word
    given: { family_id: nope, word: [x] }
    expect:
      equals:
        failure_code: unknown_family
        policy_action: family_bypass
        lookup_allowed: false

  - case_id: simple.empty_word
    op: normalize_family_word
    given: { family_id: hex6, word: [] }
    expect:
      equals:
        failure_code: empty_family_word
        policy_action: reject

  - case_id: simple.invalid_digit
    op: normalize_family_word
    given: { family_id: hex6, word: [h9] }
    expect:
      equals:
        failure_code: invalid_digit
        policy_action: reject
        invalid_digit: h9

  - case_id: simple.schema_mismatch
    op: normalize_family_word
    given: { family_id: hex6, word: [h1] }
    expect:
      equals:
        failure_code: null
    # explicit override of schema_version is exercised in the migration pack.

  - case_id: reflection.reduce_double_token
    op: normalize_reflection_path
    given: { path: [a, a, b] }
    expect:
      equals:
        reduced_path: [b]
        lookup_allowed: true
        policy_action: normal
        normalizer_version: reflection-path-normalizer@v1

  - case_id: reflection.full_cancel_rejected_as_empty
    op: normalize_reflection_path
    given: { path: [a, a] }
    expect:
      equals:
        failure_code: empty_family_word
        policy_action: reject

  - case_id: witness8.absence_routes_to_token_free
    op: normalize_witness8_row
    given: { witness8_row: [0, 0, 0, 0, 0, 0, 0, 0] }
    expect:
      equals:
        decode_status: token_free_absent
        normalizer_version: witness8-row-normalizer@v1

  - case_id: witness8.invalid_arity
    op: normalize_witness8_row
    given: { witness8_row: [1, 2, 3] }
    expect:
      equals:
        decode_status: present_invalid
        failure_code: field_order_invalid
        policy_action: reject

  - case_id: registry.normalizer.simple_v1
    op: resolve_normalizer
    given: { normalizer_id: simple-bijective-word-normalizer, version: v1 }
    expect:
      equals: { normalizer_id: simple-bijective-word-normalizer, version: v1, has_migration_plan: true }

  - case_id: registry.normalizer.reflection_v1
    op: resolve_normalizer
    given: { normalizer_id: reflection-path-normalizer, version: v1 }
    expect:
      equals: { normalizer_id: reflection-path-normalizer, version: v1, has_migration_plan: true }

  - case_id: registry.normalizer.witness8_v1
    op: resolve_normalizer
    given: { normalizer_id: witness8-row-normalizer, version: v1 }
    expect:
      equals: { normalizer_id: witness8-row-normalizer, version: v1, has_migration_plan: true }
