trace_id: mt-001-meta-normalization-and-summary
description: Deterministic meta-object normalization and stable bundle summary.
steps:
  - op: normalize_meta_object
    given:
      object_id: "  Assertion 1  "
      type_name: "Visual Symbol"
      canonical_name: " Spiral Gate "
      category: visual_symbol
      evidence_class: direct_observation
      confidence: 0.81234567
      attributes:
        Color: Blue
        Tags: [B, A]
      provenance:
        source: camera
        frames: [2, 1]
      tags: [Zeta, alpha, alpha]
    expect:
      equals:
        status: ok
        normalized.canonical_digest: sha256:69d8588f090c3f87
  - op: normalize_meta_object
    given:
      canonical_name: spiral gate
      type_name: visual   symbol
      category_path: perceptual/visual_symbol
      evidence_class: direct_observation
      confidence: 0.81234567
      attributes:
        Tags: [A, B]
        Color: Blue
      provenance:
        frames: [1, 2]
        source: camera
      tags: [alpha, zeta]
      object_id: assertion_1
    expect:
      equals:
        status: ok
        normalized.canonical_digest: sha256:69d8588f090c3f87
  - op: compute_meta_summary
    given:
      bundle_id: summary
      assertions:
        - object_id: "1"
          type_name: scene
          canonical_name: Night
          category: scene
          confidence: 0.9
        - object_id: "2"
          type_name: motif
          canonical_name: Echo
          category: motif
          confidence: 0.5
        - object_id: "3"
          type_name: motif
          canonical_name: Return
          category: motif
          confidence: 0.7
    expect:
      equals:
        status: ok
        summary.assertion_count: 3
        summary.counts_by_category.perceptual/scene: 1
        summary.counts_by_category.semantic/motif: 2