trace_id: t-007-replay-identity-mismatch-detection
description: |
  Pin a replay identity, then re-run with a deliberately drifted
  expected_normal_form_hash and an expected_mismatch flag — the diff
  must be surfaced and ledger-recorded as expected.
steps:
  - op: replay_compare
    given:
      expected:
        input_hash: "abc"
        expected_normal_form_hash: "def"
      observed:
        input_hash: "abc"
        expected_normal_form_hash: "DRIFT"
        transport_profile_version: "dbp-minsafe@v1"
        schema_versions: {}
        family_registry_version: "family-registry@v1.2"
        geometry_registry_version: "geometry-registry@v1.0"
        normalizer_versions: {}
        serializer_versions: {}
        policy_shield_version: "policy-shield@v1.2"
        retention_metric_versions: {}
        floating_point_profile: "ieee754-double"
        deterministic_seed: 0
      expected_mismatch: true
    expect:
      equals: { replay_match: false, replay_mismatch: true }
